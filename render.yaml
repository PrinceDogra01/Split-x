# Blueprint for https://render.com — create a Web Service from this repo.
# After deploy, set FRONTEND_URL to your service URL (for invite/reset links).
# Use MongoDB Atlas: Network Access → allow 0.0.0.0/0 (or Render’s outbound IPs).

services:
  - type: web
    name: splitx
    runtime: node
    plan: free
    healthCheckPath: /api/health
    buildCommand: npm ci --prefix backend && npm ci --prefix frontend && npm run build --prefix frontend
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
